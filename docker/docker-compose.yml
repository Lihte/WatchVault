services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: watchvault
      POSTGRES_USER: watchvault
      POSTGRES_PASSWORD: watchvault_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgressql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U watchvault"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6370"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    
  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
  
volumes:
  postgres_data: